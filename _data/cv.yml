  website: https://gyf9712.github.io/
  summary: >-
    My research lies at the intersection of high-dimensional statistics and artificial
    intelligence, with a focus on explainable AI and complex data modeling. I develop
    theoretically grounded methods for feature importance, functional data analysis,
    and high-dimensional inference, with applications in computational biology, medicine,
    and finance. My recent work has appeared in leading venues in statistics and
    artificial intelligence, including JASA, IEEE JBHI, and ICLR.

